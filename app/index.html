<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <title>TV.TBSERVER</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="style.css?v=3305" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <link rel="stylesheet" href="css/epg-premium-final.css?v=3305">
</head>

<body>

<div class="app">

  <aside class="sidebar">

    <div class="sidebar-top">

      <div class="brand">
        <img
          class="brand-main-logo"
          src="https://owncloud.tbserver.online/index.php/s/tzZXGpI8Ri7Ndqa/download"
          alt="TV.TBSERVER"
        >
      </div>

      <nav class="menu">

        <button class="menu-btn active" onclick="showHome()">
          <i class="fa-solid fa-house"></i>
          <span>Acasă</span>
        </button>

        <button class="menu-btn" onclick="loadMovies()">
          <i class="fa-solid fa-film"></i>
          <span>Filme</span>
        </button>

        <button class="menu-btn" onclick="loadSeries()">
          <i class="fa-solid fa-tv"></i>
          <span>Seriale</span>
        </button>

        <button class="menu-btn" onclick="loadRadio()">
          <i class="fa-solid fa-radio"></i>
          <span>Radio</span>
        </button>

        <button class="menu-btn" onclick="loadLiveTv()">
          <i class="fa-solid fa-satellite-dish"></i>
          <span>Live TV</span>
        </button>

      </nav>

    </div>

    <div class="sidebar-footer">

      <div class="premium-box">
        <div class="premium-title">
          Premium Experience
        </div>

        <div class="premium-text">
          Filme, seriale și Live TV într-un singur loc.
        </div>
      </div>

    </div>

  </aside>

  <main class="main">

    <header class="topbar">

      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>

        <input
          type="text"
          placeholder="Caută filme, seriale, canale TV..."
        />
      </div>

    </header>

    <section class="hero">

      <div class="hero-overlay"></div>

      <div class="hero-content">

        <div class="hero-badge">
          PREMIUM STREAMING
        </div>

        <h1 id="heroTitle">TV.TBSERVER</h1>

<p id="heroText">
  Filme, seriale, radio și Live TV într-o singură aplicație.
</p>

        <div class="hero-buttons">

          <button class="hero-play">
            <i class="fa-solid fa-play"></i>
            Începe vizionarea
          </button>

          <button class="hero-info">
            <i class="fa-solid fa-circle-info"></i>
            Explorează
          </button>

        </div>

      </div>

    </section>

    <section class="player-wrap" id="playerWrap">

      <div class="player-header">

        <div>
          <div class="player-title">Player</div>
          <div class="player-subtitle">
            Live TV / Filme / Radio
          </div>
        </div>

      </div>

      <div class="player-video-box" id="playerVideoBox">
        <video id="player" autoplay playsinline></video>

        <div class="live-program-overlay" id="liveProgramOverlay">
          <div class="live-program-title" id="liveProgramTitle">Live TV</div>
          <div class="live-program-time" id="liveProgramTime">Acum</div>
          <div class="live-program-badge">LIVE</div>
        </div>

        <div class="live-control-overlay" id="liveControlOverlay">
          <div class="live-progress-row">
            <div class="live-progress-track">
              <div class="live-progress-fill" id="liveProgressFill"></div>
              <div class="live-progress-dot" id="liveProgressDot"></div>
            </div>
          </div>

          <div class="live-controls-row">
            <button class="live-control-btn" id="livePauseBtn" type="button" aria-label="Pauză / Play">
              <i class="fa-solid fa-pause"></i>
            </button>
            <button class="live-control-btn" id="liveMuteBtn" type="button" aria-label="Sunet">
              <i class="fa-solid fa-volume-high"></i>
            </button>
            <div class="live-time-text" id="liveTimeText">--:-- / --:--</div>
            <div class="live-controls-spacer"></div>
            <button class="live-control-btn" id="liveFullscreenBtn" type="button" aria-label="Fullscreen">
              <i class="fa-solid fa-expand"></i>
            </button>
          </div>
        </div>
      </div>

    </section>

    <section class="content-section">

      <div class="section-header">

        <h2 id="sectionTitle">Home</h2>

      </div>

      <div id="content" class="grid"></div>

    </section>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
<script src="js/config.js?v=3305"></script>
<script src="js/hero.js?v=3305"></script>
<script src="js/player.js?v=3305"></script>
<script src="js/cards.js?v=3305"></script>
<script src="js/livetv.js?v=3305"></script>
<script src="js/epg.js?v=3305"></script>
<script src="js/core.js?v=3305"></script>
<script src="app.js?v=3305"></script>
<script src="tizen-remote.js?v=1"></script>
  <script src="js/epg-premium-final.js?v=3305"></script>
</body>
</html>
