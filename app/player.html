<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>TV.TBSERVER Live</title>
  <style>
    body {
      margin: 0;
      background: #05060a;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .topbar {
      height: 74px;
      background: #090d18;
      display: flex;
      align-items: center;
      padding: 0 28px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }

    .logo {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .wrap {
      padding: 28px;
    }

    .hero {
      border-radius: 24px;
      padding: 24px 32px;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #162447, #05060a);
    }

    .hero h1 {
      margin: 0;
      font-size: 42px;
    }

    .hero p {
      margin: 10px 0 0;
      color: #d0d4df;
      font-size: 18px;
    }

    .playerBox {
      background: black;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(0,0,0,0.6);
      height: calc(100vh - 210px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: black;
    }

    .back {
      margin-left: auto;
      background: #182033;
      color: white;
      border: 0;
      padding: 12px 18px;
      border-radius: 14px;
      font-size: 16px;
      cursor: pointer;
    }

    .back:hover {
      background: #2b395c;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo">TV.TBSERVER</div>
    <button class="back" onclick="window.close()">Închide</button>
  </div>

  <div class="wrap">
    <section class="hero">
      <h1 id="title">Live TV</h1>
      <p>Canal TV live prin TV.TBSERVER</p>
    </section>

    <div class="playerBox">
      <iframe id="frame" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const url = params.get("url");
    const name = params.get("name") || "Live TV";

    document.getElementById("title").textContent = name;

    if (url) {
      document.getElementById("frame").src = "/?url=" + encodeURIComponent(url);
    }
  </script>

</body>
</html>
